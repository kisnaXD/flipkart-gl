            border: 0.5px solid rgba(255, 255, 255, 0.1);

                        "grid-columns-mobile": "4",
                        "gutter": "16px",

<link rel="stylesheet" href="/css/gridlock-shell.css"/>

<body class="bg-background text-on-surface overflow-hidden font-body-lg">
<!-- TopNavBar (Shared Component) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-panel-padding h-16 bg-surface-container/80 backdrop-blur-lg flat no shadows">
<div class="flex items-center gap-gutter">
<div class="font-headline-md text-headline-md font-bold text-primary dark:text-primary">Gridlock</div>
<nav class="hidden md:flex ml-8 gap-6">
<a class="text-on-surface-variant dark:text-on-surface-variant hover:text-primary dark:hover:text-primary transition-colors duration-200 cursor-pointer active:scale-95 transition-transform font-label-md text-label-md" href="/">Command</a>
<a class="text-primary dark:text-primary border-b-2 border-primary dark:border-primary pb-1 hover:text-primary dark:hover:text-primary transition-colors duration-200 cursor-pointer active:scale-95 transition-transform font-label-md text-label-md" href="/map">Live Map</a>
<a class="text-on-surface-variant dark:text-on-surface-variant hover:text-primary dark:hover:text-primary transition-colors duration-200 cursor-pointer active:scale-95 transition-transform font-label-md text-label-md" href="/scenarios">Scenarios</a>
<a class="text-on-surface-variant dark:text-on-surface-variant hover:text-primary dark:hover:text-primary transition-colors duration-200 cursor-pointer active:scale-95 transition-transform font-label-md text-label-md" href="/hotspots">Hotspots</a>
<a class="text-on-surface-variant dark:text-on-surface-variant hover:text-primary dark:hover:text-primary transition-colors duration-200 cursor-pointer active:scale-95 transition-transform font-label-md text-label-md" href="/analytics">Analytics</a>
<a class="text-on-surface-variant dark:text-on-surface-variant hover:text-primary dark:hover:text-primary transition-colors duration-200 cursor-pointer active:scale-95 transition-transform font-label-md text-label-md" href="/learning">Learning Loop</a>
</nav>
</div>
<div class="flex items-center gap-4">
<button class="bg-primary text-on-primary font-label-md text-label-md px-4 py-2 rounded-DEFAULT hover:bg-primary-fixed transition-colors">Ops Mode</button>
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined">notifications</span>
</button>
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined">settings</span>
</button>
<div class="w-8 h-8 rounded-full bg-surface-variant border border-outline-variant overflow-hidden">
<img alt="Operator Profile" class="w-full h-full object-cover" data-alt="A close up, high resolution portrait of a professional female tech operator in a dimly lit, high-tech control room environment. She is wearing a dark, minimal headset. The lighting features subtle blue and cyan neon accents reflecting off her face, typical of a modern cyber-operations or war-room setting. The mood is serious, focused, and highly professional." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBCUcLT45nZqW8acP2DcpX2arsdyEnDdnSnHXJLQw-f7rbfY02m3sl1BqnCNuHRiRHC868LzPgFHUWMgdl3wX-RQLo6mm4pJosOMQrLuB4SA8NL8gWUxbEjmbbO-YiSKhBUhjVGFXwTn8iWOP0bWnB2ejEkyP8wslYaNaLDPO7DgobKs1yG22eOZsCjt2vZw2ndCw045L7bkfkEe_NR_b3FUW5DGYkbh3C_D4C70X-WsfunA2voaENoaQicZaqH6FPnvuVR0JaQmg"/>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="relative w-full h-[calc(100vh-64px)]">
<!-- Map Background -->
<div id="gl-leaflet-map" class="absolute inset-0 z-0 bg-surface-container-lowest"></div>
<!-- Top-Left Info Banner -->
<div class="absolute top-4 left-6 z-20 gl-map-overlay">
<div class="glass-panel rounded-lg p-3 flex items-center gap-3">
<div class="w-2 h-2 rounded-full bg-ops-red animate-pulse"></div>
<div id="gl-map-banner" class="font-title-md text-title-md text-on-surface">Loading simulation…</div>
<div class="px-2 py-1 rounded bg-ops-red/15 border border-ops-red/30 text-ops-red font-mono-data text-[10px] uppercase tracking-wider">Active Deployment</div>
</div>
</div>
<!-- Top-Right Toggles -->
<div class="absolute top-4 right-[384px] z-20 flex gap-2 gl-map-overlay">
<button id="gl-toggle-past" type="button" class="glass-panel px-4 py-2 rounded-full font-label-md text-label-md text-on-surface-variant hover:text-on-surface border border-outline-variant/50 flex items-center gap-2 transition-colors">
<span class="material-symbols-outlined text-sm">history</span> Past Events
            </button>
<button type="button" class="bg-surface-variant border border-primary text-primary px-4 py-2 rounded-full font-label-md text-label-md flex items-center gap-2 shadow-[0_0_8px_rgba(173,198,255,0.2)]">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">check_circle</span> Active Plan
            </button>
<button id="gl-toggle-barricades" type="button" class="glass-panel px-4 py-2 rounded-full font-label-md text-label-md text-on-surface-variant hover:text-on-surface border border-ops-pink/50 hover:border-ops-pink flex items-center gap-2 transition-colors">
<div class="w-2 h-2 rounded-full bg-ops-pink"></div> Barricades
            </button>
<button id="gl-toggle-routes" type="button" class="glass-panel px-4 py-2 rounded-full font-label-md text-label-md text-on-surface-variant hover:text-on-surface border border-ops-blue/50 hover:border-ops-blue flex items-center gap-2 transition-colors">
<div class="w-2 h-2 rounded-full bg-ops-blue"></div> Diversions
            </button>
</div>
<!-- Bottom-Left Legend -->
<div class="absolute bottom-24 left-6 z-20 gl-map-overlay">
<div class="glass-panel rounded-xl p-4 w-64 space-y-3">
<div class="font-label-md text-label-md text-outline uppercase tracking-wider mb-2">Map Legend</div>
<div class="flex items-center gap-3 font-body-sm text-body-sm text-on-surface-variant">
<span class="material-symbols-outlined text-ops-blue text-lg" style="font-variation-settings: 'FILL' 1;">star</span>
<span>Epicenter</span>
</div>
<div class="flex items-center gap-3 font-body-sm text-body-sm text-on-surface-variant">
<div class="w-4 h-4 border-2 border-dashed border-outline rounded-sm"></div>
<span>Impact Zone</span>
</div>
<div class="flex items-center gap-3 font-body-sm text-body-sm text-on-surface-variant">
<div class="w-4 h-4 rounded bg-surface-variant border border-ops-pink flex items-center justify-center">
<span class="font-mono-data text-[10px] text-ops-pink">B</span>
</div>
<span>Barricade Point</span>
</div>
<div class="flex items-center gap-3 font-body-sm text-body-sm text-on-surface-variant">
<div class="w-4 h-0.5 bg-ops-blue"></div>
<span>Diversion Route</span>
</div>
<div class="pt-2 border-t border-white/5 space-y-2">
<div class="font-label-md text-[10px] text-outline uppercase">Impact Tiers</div>
<div class="flex gap-2">
<div class="w-3 h-3 rounded-full bg-ops-red" title="Critical"></div>
<div class="w-3 h-3 rounded-full bg-ops-amber" title="High"></div>
<div class="w-3 h-3 rounded-full bg-ops-green" title="Normal"></div>
</div>
</div>
</div>
</div>
<!-- Right Drawer (Floating Glass) -->
<aside class="absolute right-6 top-4 bottom-24 w-[360px] glass-panel rounded-xl flex flex-col z-30 overflow-hidden shadow-2xl gl-map-overlay">
<!-- Header -->
<div class="p-4 border-b border-white/10 flex justify-between items-center bg-surface-container/50">
<h2 id="gl-drawer-title" class="font-title-md text-title-md text-on-surface">Action Plan</h2>
<button class="text-outline hover:text-on-surface transition-colors">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
<!-- Content -->
<div class="flex-1 overflow-y-auto p-4 space-y-6 custom-scrollbar">
<!-- Scenario Details -->
<section>
<h3 class="font-label-md text-label-md text-outline uppercase tracking-wider mb-3">Scenario Details</h3>
<div id="gl-drawer-detail" class="bg-surface-container-high rounded-lg p-3 border border-outline-variant/30">
</div>
</section>
<!-- Diversion Notes -->
<section>
<h3 class="font-label-md text-label-md text-outline uppercase tracking-wider mb-3">Active Diversions (3)</h3>
<div id="gl-drawer-routes" class="space-y-2">
</div>
</section>
<!-- Hotspots List -->
<section>
<h3 class="font-label-md text-label-md text-outline uppercase tracking-wider mb-3">Corridor Hotspots</h3>
<ul id="gl-drawer-hotspots" class="space-y-1">
</ul>
</section>
</div>
<!-- Footer CTA -->
<div class="p-4 border-t border-white/10 bg-surface-container/80 backdrop-blur-md">
<button class="w-full bg-ops-red/15 border border-ops-red text-ops-red font-label-md text-label-md py-2.5 rounded-lg hover:bg-ops-red hover:text-white transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-sm">campaign</span> Initiate Dispatch
                </button>
</div>
</aside>
<!-- Floating Bottom Bar (Scenario Chips) -->
<div class="absolute bottom-6 left-1/2 transform -translate-x-1/2 z-30">
<div id="gl-scenario-chips" class="glass-panel rounded-full px-2 py-2 flex items-center gap-2 shadow-xl border border-outline-variant/40 gl-map-overlay">
<div class="px-3 font-label-md text-[10px] text-outline uppercase tracking-widest border-r border-white/10 shrink-0">Scenarios</div>
<div id="gl-scenario-chips-inner" class="flex items-center gap-2"></div>
</div>
</div>
</main>
<style>
        /* Custom thin scrollbar for drawer */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
